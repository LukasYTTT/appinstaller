app-id: io.github.LukasYTTT.appinstaller
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.golang
command: appinstall
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=network
  - --filesystem=xdg-download
  - --filesystem=xdg-data/applications:rw
  - --filesystem=xdg-data/icons:rw
  - --filesystem=xdg-run/appimage:create
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.freedesktop.Flatpak
modules:
  - name: appinstall
    buildsystem: simple
    build-commands:
      - go build -o appinstall .
      - install -Dm755 appinstall /app/bin/appinstall
      - install -Dm644 assets/io.github.LukasYTTT.appinstaller.desktop /app/share/applications/io.github.LukasYTTT.appinstaller.desktop
      - install -Dm644 assets/io.github.LukasYTTT.appinstaller.metainfo.xml /app/share/metainfo/io.github.LukasYTTT.appinstaller.metainfo.xml
    sources:
      - type: git
        url: https://github.com/LukasYTTT/appinstaller.git
        tag: v1.0.0
        commit: 2422f9a3e023f0a1a6c449e19c4ef785b9ff955b
